name: Auto-Deploy to Cloudflare on Push

on:
  push:
    branches:
      - main

concurrency:
  group: cloudflare-auto-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN secret not configured"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ERROR: CLOUDFLARE_ACCOUNT_ID secret not configured"
            exit 1
          fi
          echo "✓ Cloudflare credentials verified"

      - name: TypeScript type check
        run: npm run check
        continue-on-error: false

      - name: Build frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy client/dist --project-name relateiq-growth --branch main
        
      - name: Deploy to Cloudflare Worker
        run: npx wrangler deploy --config relate-iq-growth-worker/wrangler.toml

      - name: Deployment Success
        run: |
          echo "✓ Deployment complete!"
          echo "Frontend: https://relateiq-growth.pages.dev"
          echo "Worker API: https://relate-iq-growth-api.tonyabdelmalak.workers.dev"

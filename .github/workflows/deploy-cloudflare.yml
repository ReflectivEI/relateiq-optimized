name: Deploy to Cloudflare

on:
  workflow_dispatch:
    inputs:
      target:
        description: What to deploy
        required: true
        default: both
        type: choice
        options:
          - pages
          - worker
          - both
      pages_project:
        description: Cloudflare Pages project name
        required: true
        default: relateiq-optimized
        type: string
      pages_branch:
        description: Branch/environment name for Pages deploy
        required: true
        default: main
        type: string
      run_checks:
        description: Run TypeScript check before deploying Pages
        required: true
        default: true
        type: boolean

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Cloudflare secrets are present
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: TypeScript check
        if: ${{ inputs.run_checks && (inputs.target == 'pages' || inputs.target == 'both') }}
        run: npm run type-check || echo "TypeScript check script not available"

      - name: Build frontend
        if: ${{ inputs.target == 'pages' || inputs.target == 'both' }}
        run: npm run build

      - name: Deploy Cloudflare Pages
        if: ${{ inputs.target == 'pages' || inputs.target == 'both' }}
        run: |
          npx wrangler pages project create "${{ inputs.pages_project }}" --production-branch main || true
          npx wrangler pages deploy client/dist --project-name "${{ inputs.pages_project }}" --branch "${{ inputs.pages_branch }}"

      - name: Deploy Cloudflare Worker
        if: ${{ inputs.target == 'worker' || inputs.target == 'both' }}
        run: npx wrangler deploy --config relate-iq-growth-worker/wrangler.toml
